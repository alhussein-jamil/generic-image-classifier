<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="390" viewBox="0 0 960 390" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Data flow</title>
  <desc id="desc">Technical data flow from a dataset zip through extraction, class mapping, train validation split, transforms, training, checkpoints and inference.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#334155" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 12px Arial, sans-serif; fill: #475569; }
      .tag { font: 700 10px Arial, sans-serif; fill: #0f172a; letter-spacing: .5px; }
      .box { stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .arrow { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5 6; }
    </style>
  </defs>

  <rect width="960" height="390" fill="url(#bg)"/>
  <text x="480" y="42" text-anchor="middle" class="title">How Images Move Through the System</text>
  <text x="480" y="65" text-anchor="middle" class="subtitle">The framework keeps the raw dataset, training tensors, saved schema, and prediction path distinct.</text>

  <g transform="translate(34 116)">
    <rect class="box" width="128" height="90" fill="#ffffff"/>
    <text x="20" y="29" class="tag">INPUT</text>
    <text x="20" y="52" class="label">dataset.zip</text>
    <text x="20" y="72" class="body">class folders</text>
  </g>

  <g transform="translate(202 116)">
    <rect class="box" width="136" height="90" fill="#ecfeff"/>
    <text x="20" y="29" class="tag">LOAD</text>
    <text x="20" y="52" class="label">Extract &amp; scan</text>
    <text x="20" y="72" class="body">valid image files</text>
  </g>

  <g transform="translate(378 116)">
    <rect class="box" width="136" height="90" fill="#eff6ff"/>
    <text x="20" y="29" class="tag">MAP</text>
    <text x="20" y="52" class="label">Class IDs</text>
    <text x="20" y="72" class="body">folder names to labels</text>
  </g>

  <g transform="translate(554 116)">
    <rect class="box" width="136" height="90" fill="#fef9c3"/>
    <text x="20" y="29" class="tag">SPLIT</text>
    <text x="20" y="52" class="label">Train / val</text>
    <text x="20" y="72" class="body">shuffle and holdout</text>
  </g>

  <g transform="translate(730 116)">
    <rect class="box" width="136" height="90" fill="#fff7ed"/>
    <text x="20" y="29" class="tag">TENSOR</text>
    <text x="20" y="52" class="label">Transforms</text>
    <text x="20" y="72" class="body">resize, augment, normalize</text>
  </g>

  <g transform="translate(238 264)">
    <rect class="box" width="174" height="84" fill="#f8fafc"/>
    <text x="22" y="29" class="tag">MODEL</text>
    <text x="22" y="52" class="label">Torchvision backbone</text>
    <text x="22" y="71" class="body">custom classification head</text>
  </g>

  <g transform="translate(493 264)">
    <rect class="box" width="174" height="84" fill="#fff1f2"/>
    <text x="22" y="29" class="tag">SAVE</text>
    <text x="22" y="52" class="label">Checkpoint bundle</text>
    <text x="22" y="71" class="body">weights, schema, examples</text>
  </g>

  <g transform="translate(748 264)">
    <rect class="box" width="174" height="84" fill="#f0fdf4"/>
    <text x="22" y="29" class="tag">PREDICT</text>
    <text x="22" y="52" class="label">Gradio inference</text>
    <text x="22" y="71" class="body">softmax class probabilities</text>
  </g>

  <path class="arrow" d="M162 161 H192"/>
  <path class="arrow" d="M338 161 H368"/>
  <path class="arrow" d="M514 161 H544"/>
  <path class="arrow" d="M690 161 H720"/>
  <path class="arrow" d="M798 206 C798 244 714 257 676 286"/>
  <path class="arrow" d="M493 306 H422"/>
  <path class="arrow" d="M667 306 H738"/>
  <path class="soft" d="M622 206 C622 236 518 244 365 264"/>
  <path class="soft" d="M446 206 C446 234 387 244 331 264"/>

  <g transform="translate(48 248)">
    <rect x="0" y="0" width="126" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="16" y="17" class="body">Supported files</text>
    <text x="16" y="33" class="tag">JPG PNG BMP TIFF</text>
  </g>
</svg>
