<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Model choices</title>
  <desc id="desc">Model family spectrum showing faster lightweight models, balanced backbones, larger high capacity models, and a custom CNN fallback.</desc>
  <defs>
    <linearGradient id="axis" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 12px Arial, sans-serif; fill: #475569; }
      .small { font: 700 11px Arial, sans-serif; fill: #334155; letter-spacing: .45px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .chip { font: 700 11px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="960" height="420" fill="url(#bg)"/>
  <path d="M0 330 C120 300 210 346 330 316 S558 286 696 316 S840 364 960 320 L960 420 L0 420 Z" fill="#ecfeff"/>

  <text x="480" y="42" text-anchor="middle" class="title">Pick the Backbone That Fits the Job</text>
  <text x="480" y="65" text-anchor="middle" class="subtitle">The framework swaps the classification head for your class count while keeping familiar torchvision families.</text>

  <g transform="translate(110 102)">
    <rect x="0" y="40" width="740" height="12" rx="6" fill="url(#axis)"/>
    <circle cx="0" cy="46" r="14" fill="#14b8a6"/>
    <circle cx="370" cy="46" r="14" fill="#3b82f6"/>
    <circle cx="740" cy="46" r="14" fill="#f97316"/>
    <text x="0" y="20" text-anchor="middle" class="small">FAST</text>
    <text x="370" y="20" text-anchor="middle" class="small">BALANCED</text>
    <text x="740" y="20" text-anchor="middle" class="small">HIGH CAPACITY</text>
    <text x="0" y="84" text-anchor="middle" class="body">short iteration</text>
    <text x="370" y="84" text-anchor="middle" class="body">good default</text>
    <text x="740" y="84" text-anchor="middle" class="body">more compute</text>
  </g>

  <g transform="translate(54 224)">
    <rect class="card" width="200" height="122"/>
    <rect x="20" y="20" width="54" height="24" rx="8" fill="#ccfbf1"/>
    <text x="47" y="36" text-anchor="middle" class="chip" fill="#0f766e">FAST</text>
    <text x="20" y="64" class="label">MobileNetV2</text>
    <text x="20" y="87" class="body">Default quick start</text>
    <text x="20" y="106" class="body">Low memory, fast feedback</text>
  </g>

  <g transform="translate(280 224)">
    <rect class="card" width="200" height="122"/>
    <rect x="20" y="20" width="72" height="24" rx="8" fill="#dbeafe"/>
    <text x="56" y="36" text-anchor="middle" class="chip" fill="#1d4ed8">STEADY</text>
    <text x="20" y="64" class="label">ResNet50 / 101</text>
    <text x="20" y="87" class="body">Reliable transfer learning</text>
    <text x="20" y="106" class="body">Good speed and accuracy mix</text>
  </g>

  <g transform="translate(506 224)">
    <rect class="card" width="200" height="122"/>
    <rect x="20" y="20" width="78" height="24" rx="8" fill="#fef3c7"/>
    <text x="59" y="36" text-anchor="middle" class="chip" fill="#a16207">EFFICIENT</text>
    <text x="20" y="64" class="label">EfficientNet B0-B7</text>
    <text x="20" y="87" class="body">Scales with available compute</text>
    <text x="20" y="106" class="body">Strong accuracy per parameter</text>
  </g>

  <g transform="translate(732 224)">
    <rect class="card" width="174" height="122"/>
    <rect x="20" y="20" width="74" height="24" rx="8" fill="#ffe4e6"/>
    <text x="57" y="36" text-anchor="middle" class="chip" fill="#be123c">CLASSIC</text>
    <text x="20" y="64" class="label">VGG / DenseNet</text>
    <text x="20" y="87" class="body">Useful baselines</text>
    <text x="20" y="106" class="body">More capacity variants</text>
  </g>

  <g transform="translate(360 362)">
    <rect x="0" y="0" width="240" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="120" y="22" text-anchor="middle" class="body">Unknown names fall back to a compact custom CNN.</text>
  </g>
</svg>
