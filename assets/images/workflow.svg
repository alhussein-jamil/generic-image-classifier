<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="360" viewBox="0 0 960 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">User workflow</title>
  <desc id="desc">Five step workflow: prepare image folders, upload a dataset, configure training, train and evaluate, then classify new images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f0fdfa"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .step { font: 700 12px Arial, sans-serif; fill: #0f766e; letter-spacing: .5px; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 12px Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; filter: url(#shadow); }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <circle cx="70" cy="310" r="120" fill="#38bdf8" opacity="0.08"/>
  <circle cx="870" cy="62" r="120" fill="#fb7185" opacity="0.08"/>

  <text x="480" y="42" text-anchor="middle" class="title">Train a Classifier in One Pass</text>
  <text x="480" y="65" text-anchor="middle" class="subtitle">The same flow works from the all-in-one Gradio app or from the command line.</text>

  <g transform="translate(42 122)">
    <rect class="card" width="158" height="144"/>
    <circle cx="79" cy="42" r="24" fill="#ccfbf1"/>
    <path d="M58 49 h42 a5 5 0 0 0 5-5 V31 a5 5 0 0 0-5-5H82 l-8-7H58 a5 5 0 0 0-5 5v20a5 5 0 0 0 5 5z" fill="#14b8a6"/>
    <text x="79" y="82" text-anchor="middle" class="step">STEP 1</text>
    <text x="79" y="106" text-anchor="middle" class="label">Prepare Folders</text>
    <text x="79" y="128" text-anchor="middle" class="body">One class per folder</text>
  </g>

  <g transform="translate(230 122)">
    <rect class="card" width="158" height="144"/>
    <circle cx="79" cy="42" r="24" fill="#dbeafe"/>
    <path d="M79 23 v31 M67 35 l12-12 12 12 M62 58 h34" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="79" y="82" text-anchor="middle" class="step">STEP 2</text>
    <text x="79" y="106" text-anchor="middle" class="label">Upload ZIP</text>
    <text x="79" y="128" text-anchor="middle" class="body">Drag into the UI</text>
  </g>

  <g transform="translate(418 122)">
    <rect class="card" width="158" height="144"/>
    <circle cx="79" cy="42" r="24" fill="#ffedd5"/>
    <path d="M62 30 h34 M62 43 h34 M62 56 h34" stroke="#ea580c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="72" cy="30" r="5" fill="#ea580c"/>
    <circle cx="89" cy="43" r="5" fill="#ea580c"/>
    <circle cx="78" cy="56" r="5" fill="#ea580c"/>
    <text x="79" y="82" text-anchor="middle" class="step">STEP 3</text>
    <text x="79" y="106" text-anchor="middle" class="label">Set Options</text>
    <text x="79" y="128" text-anchor="middle" class="body">Model, epochs, size</text>
  </g>

  <g transform="translate(606 122)">
    <rect class="card" width="158" height="144"/>
    <circle cx="79" cy="42" r="24" fill="#fef9c3"/>
    <path d="M59 57 h40 M64 51 V37 M79 51 V27 M94 51 V42" stroke="#ca8a04" stroke-width="5" stroke-linecap="round"/>
    <path d="M58 58 h42" stroke="#713f12" stroke-width="2" stroke-linecap="round"/>
    <text x="79" y="82" text-anchor="middle" class="step">STEP 4</text>
    <text x="79" y="106" text-anchor="middle" class="label">Train &amp; Review</text>
    <text x="79" y="128" text-anchor="middle" class="body">History and matrix</text>
  </g>

  <g transform="translate(794 122)">
    <rect class="card" width="158" height="144"/>
    <circle cx="79" cy="42" r="24" fill="#fee2e2"/>
    <rect x="57" y="27" width="44" height="34" rx="6" fill="none" stroke="#e11d48" stroke-width="3"/>
    <path d="M63 52 l9-10 7 7 8-12 8 15" fill="none" stroke="#e11d48" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="70" cy="36" r="4" fill="#e11d48"/>
    <text x="79" y="82" text-anchor="middle" class="step">STEP 5</text>
    <text x="79" y="106" text-anchor="middle" class="label">Classify Images</text>
    <text x="79" y="128" text-anchor="middle" class="body">Get ranked labels</text>
  </g>

  <path class="arrow" d="M200 194 H220"/>
  <path class="arrow" d="M388 194 H408"/>
  <path class="arrow" d="M576 194 H596"/>
  <path class="arrow" d="M764 194 H784"/>
</svg>
